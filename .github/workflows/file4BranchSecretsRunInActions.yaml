name: Using branch secrets and run
on:
  push:
    branches: [ main ]

jobs:
  UsingBranchSecretsRun:
    runs-on: ubuntu-latest

    steps:
      - name: Clone Repo
        uses: actions/checkout@v6

      - name: Doing python setup
        uses: actions/setup-python@v6.2.0
        with:
          python-version: '3.10'
          
      - name: Running Python file
        run: python file2PythonFile.py

      - name: Adding and using secrets
        env:
          NAME: ${{ secrets.USER_NAME }}
          ROLE: ${{ secrets.USER_ROLE }}
        run: 
          echo "Running from run command in action yaml"
          echo "User name is $NAME"
          echo "Role is $ROLE"
          ls &&
          pwd &&
          echo "Run command done"
            
          
